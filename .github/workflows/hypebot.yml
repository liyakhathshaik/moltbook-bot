name: SpaceReelsKing HypeBot - Phase 1 (Strict Safe 15 Days)

on:
  schedule:
    - cron: '0 3,15 * * *'
  workflow_dispatch:

jobs:
  hype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run SpaceReelsKing (Safe + New SDK)
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python hypebot.py
