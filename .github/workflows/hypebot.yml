name: SpaceReelsKing HypeBot - Phase 2 (Hourly Space Posts)

on:
  schedule:
    - cron: '*/40 * * * *'         # every hour
  workflow_dispatch:

jobs:
  hype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run SpaceReelsKing
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          GEMINIKEY1: ${{ secrets.GEMINIKEY1 }}
          GEMINIKEY2: ${{ secrets.GEMINIKEY2 }}
          GEMINIKEY3: ${{ secrets.GEMINIKEY3 }}
        run: python hypebot.py
