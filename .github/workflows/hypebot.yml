name: SpaceReelsKing HypeBot - Phase 1 (Ultra Safe)

on:
  schedule:
    - cron: '0 4,16 * * *'   # only twice a day, 12 hours apart
  workflow_dispatch:

jobs:
  hype:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Run SpaceReelsKing (New GenAI + 3 keys fallback)
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          GEMINIKEY1: ${{ secrets.GEMINIKEY1 }}
          GEMINIKEY2: ${{ secrets.GEMINIKEY2 }}
          GEMINIKEY3: ${{ secrets.GEMINIKEY3 }}
        run: python hypebot.py
